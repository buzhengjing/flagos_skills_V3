# FlagRelease 配置文件 - 从容器开始
# 当上游提供的是一个已运行的容器时使用此配置

# ========================================
# 必填配置
# ========================================


stages_to_run: ["publish"]

input_type: container
container_name: tx_qwen3-next

model_info:
  source_of_model_weights: "Qwen/Qwen3-Next-80B-A3B"  # 必填

  # 可选：容器启动命令（会填入 README）
  # 如果不填，README 中会显示占位符
  container_run_cmd: |
     docker run --init --detach --net=host --uts=host --ipc=host --security-opt=seccomp=unconfined --privileged=true --ulimit stack=67108864 --ulimit memlock=-1 --ulimit nofile=1048576:1048576 --shm-size=32G -v /data:/data --gpus all --name flagos  {{IMAGE}}  sleep infinity
     docker exec -it flagos /bin/bash

  # 可选：服务启动命令（会填入 README）
  # 如果不填，README 中会显示占位符
  serve_start_cmd: |
     VLLM_USE_DEEP_GEMM=0 vllm serve \
     /data/qwen3-next \
     --host 0.0.0.0 --port 8888 \
     --tensor-parallel-size 2 \
     --gpu-memory-utilization 0.85 \
     --max-num-batched-tokens 8192 \
     --max-num-seqs 1024 \
     --compilation-config '{"cudagraph_mode": "FULL_AND_PIECEWISE"}'

  # 可选：评测结果
  evaluation_results:
     - metric: AIME
       origin: 80.00
       flagos: 83.33
     - metric: GPQA
       origin: 64.26
       flagos: 67.20
     - metric: LiveBench
       origin: 65.24
       flagos: 77.02
     - metric: MMLU
       origin: 71.46
       flagos: 81.18
     - metric: MUSR
       origin: 53.17
       flagos: 60.85

# ========================================
# 可选配置
# ========================================

chip:
  vendor: auto  # 自动检测，或手动指定
  harbor_registry: "harbor.baai.ac.cn/flagrelease-public"

publish:
  tag_image: true
  push_harbor: true
  private: true
    #  existing_harbor_image: "harbor.baai.ac.cn/flagrelease-public/flagrelease-nvidia-release-model_qwen3-next-80b-a3b-tree_none-gems_4.2.1rc0-scale_none-cx_none-python_3.12.3-torch_cuda-2.9.0-pcp_cuda13.1-gpu_h20-3e-arc_amd64-driver_570.158.01_260330:202603301143"
  upload_weights: true
  weights_dir: "/data/qwen3-next"
  # results_dir: "/flagos-workspace/results"  # 自动读取评测结果填入 README
  # 发布平台控制（默认都发布，设为 false 可跳过）
  publish_modelscope: false
  publish_huggingface: false
  # 如果镜像已上传到 Harbor，填写 pull 地址可跳过 commit/tag/push 步骤
  # existing_harbor_image: "harbor.baai.ac.cn/flagrelease-public/xxx:tag"
