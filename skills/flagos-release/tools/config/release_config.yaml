# FlagRelease 配置文件 - 从镜像开始
# 发布流程：镜像打 tag → push Harbor → 生成 README → 上传 ModelScope/HuggingFace

# ========================================
# 必填配置
# ========================================

input_type: image
image_path: "harbor.example.com/flagrelease/base:latest"

model_info:
  source_of_model_weights: "Qwen/Qwen3-8B"  # 必填

  # 可选：评测结果
  # evaluation_results:
  #   - metric: ERQA
  #     origin: 65.28
  #     flagos: 67.79

# ========================================
# 可选配置
# ========================================

chip:
  vendor: auto
  harbor_registry: "harbor.baai.ac.cn/flagrelease-public"

publish:
  upload_weights: false
  # weights_dir: "/data/models/Qwen3-8B"
  # results_dir: "/flagos-workspace/results"  # 自动读取评测结果填入 README
  # modelscope_token: ""      # 或设置环境变量 MODELSCOPE_TOKEN
  # huggingface_token: ""     # 或设置环境变量 HF_TOKEN
